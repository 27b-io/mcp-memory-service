services:
  # Qdrant vector database
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: mcp-memory-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      # Qdrant image has no curl/wget/nc — use bash /dev/tcp for HTTP readiness
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /readyz HTTP/1.0\\r\\n\" >&3 && grep -q \"ready\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 512M
    networks:
      - mcp-memory

  # FalkorDB graph database (Redis protocol)
  falkordb:
    image: docker.io/falkordb/falkordb:latest
    container_name: mcp-memory-falkordb
    volumes:
      - falkordb-data:/data
    command: ["--appendonly", "yes", "--appendfsync", "everysec"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    networks:
      - mcp-memory

  # HuggingFace Text Embeddings Inference (TEI)
  # Serves embeddings via OpenAI-compatible API
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: mcp-memory-tei
    command:
      - --model-id
      - Snowflake/snowflake-arctic-embed-l-v2.0
      - --port
      - "80"
      - --tokenization-workers
      - "4"
      - --max-batch-tokens
      - "2048"
    volumes:
      - tei-data:/data
    environment:
      - HF_HOME=/data
      - OMP_NUM_THREADS=2
      - RAYON_NUM_THREADS=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 12G
        reservations:
          cpus: "1"
          memory: 4G
    networks:
      - mcp-memory

  # MCP Memory Service (slim — external embedding via TEI)
  mcp-memory:
    build:
      context: .
      dockerfile: Dockerfile.slim
    container_name: mcp-memory-unified
    depends_on:
      qdrant:
        condition: service_healthy
      falkordb:
        condition: service_healthy
      tei:
        condition: service_healthy
    ports:
      - "8000:8000"  # HTTP API + dashboard
      - "8001:8001"  # MCP streamable-http
    environment:
      # Storage
      - MCP_QDRANT_URL=http://qdrant:6333

      # External embedding via TEI (1024-dim arctic-embed-l-v2.0)
      - MCP_EMBEDDING_PROVIDER=openai_compat
      - MCP_EMBEDDING_URL=http://tei:80
      - MCP_EMBEDDING_DIMENSIONS=1024
      - MCP_MEMORY_EMBEDDING_MODEL=Snowflake/snowflake-arctic-embed-l-v2.0

      # FalkorDB graph layer
      - MCP_FALKORDB_ENABLED=true
      - MCP_FALKORDB_HOST=falkordb
      - MCP_FALKORDB_PORT=6379
      - MCP_FALKORDB_PASSWORD=

      # CacheKit L2 (reuse FalkorDB on db 1)
      - REDIS_URL=redis://falkordb:6379/1

      # HTTP server
      - MCP_HTTP_ENABLED=true
      - MCP_HTTP_PORT=8000
      - MCP_HTTP_HOST=0.0.0.0

      # MCP server (streamable-http transport)
      - MCP_TRANSPORT_MODE=streamable-http
      - MCP_SERVER_PORT=8001
      - MCP_SERVER_HOST=0.0.0.0

      # Logging
      - MCP_LOG_LEVEL=INFO
    volumes:
      - mcp-memory-backups:/root/.local/share/mcp-memory/backups
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    networks:
      - mcp-memory

volumes:
  qdrant-data:
    driver: local
  falkordb-data:
    driver: local
  tei-data:
    driver: local
  mcp-memory-backups:
    driver: local

networks:
  mcp-memory:
    driver: bridge
